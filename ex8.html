<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="n1">
<input type="number" id="n2">

<button onclick="somar()">
    Somar
</button>

<p id="resultado"></p>

<script>
    function somar() {
    let numero1 = Number(document.getElementById("n1").value);
    let numero2 = Number(number = document.getElementById("n2").value);
    let total = numero1 + numero2;
    document.getElementById("resultado").innerText = total;
}
</script>
</body>
</html>
