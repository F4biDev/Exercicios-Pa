<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="mensagem">
        Clique no botão para mudar minha cor.
    </p>
    
    <button onclick="mudarCor()">
        Mudar Cor

        <script>
        function mudarCor() {
        let elemento = document.getElementById("mensagem");
    elemento.style.color = "red";
    elemento.style.fontSize = "24px";
}
        </script>
    </button>
</body>
</html>
