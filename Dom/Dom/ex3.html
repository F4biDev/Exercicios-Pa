<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2 id="contador">0</h2>

<button onclick="somar()">
    Clique Aqui
</button>

<script>
    
let cliques = 0;

    function somar() {
    cliques = cliques + 1; 
    document.getElementById("contador").innerText = cliques;
}
</script>
</body>
</html>
